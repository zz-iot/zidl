name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS ARM64
            os: macos-latest
          # Uncomment to add Intel macOS coverage (uses more CI minutes):
          # - name: macOS x86_64
          #   os: macos-13
          - name: Windows x86_64
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
          # setup-zig caches both the Zig toolchain and the global Zig cache
          # automatically; no separate actions/cache step is needed.

      # Format check is platform-independent; run once on Linux only.
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: zig fmt --check src/ packages/ tools/ test/xrce-microzig/

      # ── Core tests ────────────────────────────────────────────────────────

      - name: Test (main)
        run: zig build test

      - name: Test (TSan)
        if: matrix.os == 'ubuntu-latest'
        run: zig build test -Dsanitize-thread

      - name: Test (zidl-rt)
        run: zig build test
        working-directory: packages/zidl-rt

      - name: Test (zidl-rt TSan)
        if: matrix.os == 'ubuntu-latest'
        run: zig build test -Dsanitize-thread
        working-directory: packages/zidl-rt

      - name: Test (zidl-cdr)
        run: zig build test
        working-directory: packages/zidl-cdr

      - name: Test (zidl-cdr TSan)
        if: matrix.os == 'ubuntu-latest'
        run: zig build test -Dsanitize-thread
        working-directory: packages/zidl-cdr

      # ── Integration tests ─────────────────────────────────────────────────
      # C and C++ use Zig's bundled clang/clang++; no external compiler needed.
      # Java requires javac/java; GitHub-hosted runners include a JDK on all
      # platforms.  If javac is not found, build.zig skips Java with a warning.

      - name: Integration tests
        run: zig build integration-test

      # ── Interop tests ─────────────────────────────────────────────────────
      # Expected CDR bytes are hardcoded in zig_interop_test.zig; no Cyclone
      # DDS installation needed.  `zig build interop-test` works on all platforms.

      - name: Interop tests
        run: zig build interop-test

      # ── MicroZig-facing XRCE codegen ─────────────────────────────────────
      # zidl itself runs on Zig 0.16.0, but MicroZig currently requires Zig
      # 0.15.1.  Generate a bounded XRCE fixture with the 0.15.1 output mode,
      # then switch toolchains and compile the generated package.

      - name: Generate XRCE MicroZig fixture
        if: matrix.os == 'ubuntu-latest'
        run: zig build run -- -b zig --profile xrce --zig-version 0.15.1 -o test/xrce-microzig/generated test/xrce-microzig/types.idl

      - name: Install Zig 0.15.1
        if: matrix.os == 'ubuntu-latest'
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.1"

      - name: Test XRCE MicroZig fixture
        if: matrix.os == 'ubuntu-latest'
        run: zig build test
        working-directory: test/xrce-microzig

  # ── Valgrind ──────────────────────────────────────────────────────────────

  valgrind:
    name: Valgrind (memcheck)
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install Valgrind
        run: sudo apt-get install -y --no-install-recommends valgrind

      - name: Build test binaries (main)
        run: zig build emit-tests -Doptimize=Debug -Dtarget=x86_64-linux-gnu

      - name: Build test binaries (zidl-rt)
        run: zig build emit-tests -Doptimize=Debug -Dtarget=x86_64-linux-gnu
        working-directory: packages/zidl-rt

      - name: Build test binaries (zidl-cdr)
        run: zig build emit-tests -Doptimize=Debug -Dtarget=x86_64-linux-gnu
        working-directory: packages/zidl-cdr

      - name: Run tests under Valgrind
        run: |
          set -e
          ERRORS=0
          for bin in \
            zig-out/tests/* \
            packages/zidl-rt/zig-out/tests/* \
            packages/zidl-cdr/zig-out/tests/*; do
            [ -x "$bin" ] || continue
            echo "=== valgrind: $(basename $bin) ==="
            VALOUT=$(mktemp)
            if ! valgrind \
                --error-exitcode=1 \
                --leak-check=full \
                --show-leak-kinds=definite,indirect \
                --errors-for-leak-kinds=definite,indirect \
                --track-origins=yes \
                --log-file="$VALOUT" \
                "$bin"; then
              echo "::error::Valgrind reported errors in $(basename $bin)"
              cat "$VALOUT"
              ERRORS=$((ERRORS + 1))
            fi
            rm -f "$VALOUT"
          done
          [ $ERRORS -eq 0 ]

  # ── Coverage ──────────────────────────────────────────────────────────────
  #
  # Builds all test binaries to zig-out/tests/ (and packages/*/zig-out/tests/),
  # runs each through kcov (DWARF-based instrumentation — no compiler changes
  # needed), and uploads the merged cobertura.xml to Codecov.
  #
  # Gated on the full test matrix so coverage only uploads when the entire
  # suite is green.

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Cache kcov and patched elfutils
        id: cache-kcov
        uses: actions/cache@v4
        with:
          path: |
            /tmp/kcov-src
            /tmp/kcov-build
            /tmp/elfutils-patched
          key: kcov-v42-elfutils-uleb128-${{ runner.os }}

      - name: Install kcov build and runtime dependencies
        if: steps.cache-kcov.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            binutils-dev libdw-dev libcurl4-openssl-dev \
            zlib1g-dev libiberty-dev cmake libcurl4

      - name: Build patched elfutils and kcov
        if: steps.cache-kcov.outputs.cache-hit != 'true'
        run: |
          # Patch elfutils 0.195: fix extended opcode length to use ULEB128
          # (DWARF spec 6.2.5.3).  Zig 0.16.0 emits vendor extended opcodes
          # with body length >= 128; libdw reads only the first ULEB byte,
          # misidentifies the sub-opcode, and misparses the rest of the stream.
          cd /tmp
          wget -q https://sourceware.org/elfutils/ftp/0.195/elfutils-0.195.tar.bz2
          echo "37629fdf7f1f3dc2818e138fca2b8094177d6c2d0f701d3bb650a561218dc026  elfutils-0.195.tar.bz2" | sha256sum --check
          tar xjf elfutils-0.195.tar.bz2
          cat > /tmp/patch_elfutils.py << 'PYEOF'
          import sys
          fname = '/tmp/elfutils-0.195/libdw/dwarf_getsrclines.c'
          with open(fname) as f:
              s = f.read()
          old = '\t  if (unlikely (lineendp - linep < 2))\n\t    goto invalid_data;\n\n\t  /* The length.  */\n\t  uint_fast8_t len = *linep++;'
          new = '\t  if (unlikely (linep >= lineendp))\n\t    goto invalid_data;\n\n\t  /* Extended opcode length is ULEB128 per DWARF spec 6.2.5.3.  */\n\t  Dwarf_Word len;\n\t  get_uleb128 (len, linep, lineendp);'
          if old not in s:
              sys.exit('elfutils patch target not found')
          with open(fname, 'w') as f:
              f.write(s.replace(old, new, 1))
          print('elfutils ULEB128 fix applied')
          PYEOF
          python3 /tmp/patch_elfutils.py
          cd /tmp/elfutils-0.195
          ./configure --prefix=/tmp/elfutils-patched \
            --disable-nls --disable-debuginfod
          make -j$(nproc)
          make install
          # Build kcov linked against patched elfutils
          git clone --depth=1 --branch v42 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/tmp/elfutils-patched
          make -C /tmp/kcov-build -j$(nproc)

      - name: Install patched libdw and kcov
        run: |
          sudo install -m755 /tmp/elfutils-patched/lib/libdw-0.195.so \
            /usr/local/lib/libdw-0.195.so
          sudo ln -sf /usr/local/lib/libdw-0.195.so /usr/local/lib/libdw.so.1
          sudo ldconfig
          sudo cp /tmp/kcov-build/src/kcov /usr/local/bin/kcov

      - name: Build test binaries (main)
        run: zig build emit-tests

      - name: Build test binaries (zidl-rt)
        run: zig build emit-tests
        working-directory: packages/zidl-rt

      - name: Build test binaries (zidl-cdr)
        run: zig build emit-tests
        working-directory: packages/zidl-cdr

      - name: Run tests under kcov
        run: |
          mkdir -p coverage
          for bin in \
            zig-out/tests/* \
            packages/zidl-rt/zig-out/tests/* \
            packages/zidl-cdr/zig-out/tests/*; do
            [ -f "$bin" ] || continue
            kcov --include-path="$(pwd)/src,$(pwd)/packages" \
              --exclude-line=unreachable,@panic coverage/ "$bin" || true
          done

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/kcov-merged/cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: kcov-coverage
          path: coverage/kcov-merged/
          retention-days: 14
